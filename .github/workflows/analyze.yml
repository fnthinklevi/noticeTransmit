name: Analyze & Test

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]
  workflow_dispatch:

jobs:
  analyze:
    name: Flutter Analyze
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.4'
          channel: 'stable'
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: Flutter analyze
        run: |
          set +e
          flutter analyze --no-pub > analyze_output.log 2>&1
          EXIT_CODE=$?
          set -e
          cat analyze_output.log
          if grep -E "^ +error •" analyze_output.log; then
            echo "❌ 存在代码错误，CI失败"
            exit 1
          fi
          echo "✅ 无致命代码错误，仅风格提示已忽略"

      - name: Flutter format check
        run: flutter format --set-exit-if-changed lib/
