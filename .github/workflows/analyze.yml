name: Analyze & Test

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]
  workflow_dispatch:

jobs:
  analyze:
    name: Flutter Analyze
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.4'
          channel: 'stable'
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: Flutter analyze
        run: |
          set +e
          flutter analyze --no-pub > analyze_output.log 2>&1
          EXIT_CODE=$?
          set -e
          cat analyze_output.log
          if grep -E "^ +error •" analyze_output.log; then
            echo "❌ 存在代码错误，CI失败"
            exit 1
          fi
          echo "✅ 无致命代码错误，仅风格提示已忽略"

      - name: Flutter format check
        run: dart format --set-exit-if-changed lib/

      - name: Run code metrics analysis
        run: |
          set +e
          dart run dart_code_metrics:metrics analyze lib/ --reporter=github > metrics_output.log 2>&1
          EXIT_CODE=$?
          set -e
          cat metrics_output.log
          echo "代码质量检测完成"

      - name: Run unit tests
        run: |
          set +e
          flutter test --no-pub --coverage > test_output.log 2>&1
          EXIT_CODE=$?
          set -e
          cat test_output.log
          if [ $EXIT_CODE -ne 0 ]; then
            echo "❌ 测试失败，CI失败"
            exit 1
          fi
          echo "✅ 所有测试通过"

      - name: Generate coverage report
        run: |
          genhtml coverage/lcov.info -o coverage/html
          echo "✅ 代码覆盖率报告已生成"

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/html/