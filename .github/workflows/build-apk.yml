name: Build Release APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'zulu'
          cache: 'gradle'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.4'
          channel: 'stable'
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: Dart format check
        run: dart format --set-exit-if-changed lib/

      - name: Flutter analyze
        run: |
          set +e
          flutter analyze --no-pub > analyze_output.log 2>&1
          EXIT_CODE=$?
          set -e
          cat analyze_output.log
          if grep -E "^ +error •" analyze_output.log; then
            echo "❌ 存在代码错误，CI失败"
            exit 1
          fi
          echo "✅ 无致命代码错误，仅风格提示已忽略 "

      - name: Modify gradle repositories to official source
        run: |
          sed -i '/maven.*aliyun/d' android/build.gradle.kts
          sed -i '/maven.*aliyun/d' android/settings.gradle.kts
          sed -i 's/repositories {/repositories {\n        google()\n        mavenCentral()/' android/build.gradle.kts
          sed -i 's/repositories {/repositories {\n        google()\n        mavenCentral()/' android/settings.gradle.kts

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | python3 -c "import sys, base64; sys.stdout.buffer.write(base64.b64decode(sys.stdin.read().strip()))" > android/app/key.jks

      - name: Build APK (arm64)
        run: flutter build apk --release --target-platform android-arm64
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEYSTORE_FILE: key.jks

      - name: Get version
        id: version
        run: |
          VERSION=$(grep 'version:' pubspec.yaml | head -1 | awk '{print $2}' | cut -d'+' -f1)
          BUILD=$(grep 'version:' pubspec.yaml | head -1 | awk '{print $2}' | cut -d'+' -f2)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "build=$BUILD" >> $GITHUB_OUTPUT
          echo "APK_NAME=notice${VERSION}.apk" >> $GITHUB_OUTPUT

      - name: Rename APK
        run: mv build/app/outputs/flutter-apk/app-release.apk build/app/outputs/flutter-apk/${{ steps.version.outputs.APK_NAME }}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.version.outputs.APK_NAME }}
          path: build/app/outputs/flutter-apk/${{ steps.version.outputs.APK_NAME }}

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: v${{ steps.version.outputs.version }}
          files: build/app/outputs/flutter-apk/${{ steps.version.outputs.APK_NAME }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
